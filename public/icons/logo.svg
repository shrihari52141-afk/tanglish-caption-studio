<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#9333ea"/>
      <stop offset="100%" style="stop-color:#7e22ce"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Shine overlay -->
  <rect x="16" y="16" width="480" height="240" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Play button circle -->
  <circle cx="256" cy="220" r="100" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>

  <!-- Play triangle -->
  <polygon points="228,170 228,270 318,220" fill="white"/>

  <!-- Subtitle lines -->
  <rect x="100" y="340" width="312" height="8" rx="4" fill="rgba(255,255,255,0.9)"/>
  <rect x="130" y="365" width="252" height="8" rx="4" fill="rgba(255,255,255,0.7)"/>
  <rect x="155" y="390" width="202" height="8" rx="4" fill="rgba(255,255,255,0.5)"/>

  <!-- Small decorative dots -->
  <circle cx="400" cy="100" r="6" fill="rgba(255,255,255,0.2)"/>
  <circle cx="430" cy="130" r="4" fill="rgba(255,255,255,0.15)"/>
  <circle cx="110" cy="120" r="5" fill="rgba(255,255,255,0.2)"/>
</svg>
