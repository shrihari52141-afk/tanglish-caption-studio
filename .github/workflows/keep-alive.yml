name: Keep Render Awake

on:
  schedule:
    # Every 10 minutes (Render free tier sleeps after 15 min idle).
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 \
              https://tanglish-caption-api.onrender.com/api/config/public || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Server is awake."
              exit 0
            fi
            sleep 15
          done
          echo "Server did not respond 200 after retries (likely still cold-starting)."
          exit 0
